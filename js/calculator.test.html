<!DOCTYPE html>
<html><head><title>Calculator Tests</title></head>
<body>
<pre id="output"></pre>
<script type="module">
import { calculate } from './calculator.js';
import { AIRCRAFT_TYPES } from './fleet-data.js';

const log = (msg) => { document.getElementById('output').textContent += msg + '\n'; };
let passed = 0, failed = 0;

function assert(name, actual, expected, tolerance = 0.01) {
  if (Math.abs(actual - expected) <= tolerance) {
    log(`✓ ${name}`);
    passed++;
  } else {
    log(`✗ ${name}: expected ${expected}, got ${actual}`);
    failed++;
  }
}

const DA40NG = AIRCRAFT_TYPES.DA40NG;
const FLEET = DA40NG.fleet;

// Test 1: OE-DDA with 150kg front seats, 20kg baggage, 148L fuel
const result1 = calculate({
  aircraft: FLEET[0], // OE-DDA
  typeConfig: DA40NG,
  stationMasses: { frontSeats: 150, rearSeats: 0, stdBaggage: 20, baggageTube: 0, shortBagExt: 0, fwdExtBag: 0, aftExtBag: 0 },
  fuelLiters: { mainFuel: 148 },
  fuelMaxLiters: { mainFuel: 148 },
});

log('=== Test 1: OE-DDA example from PDF ===');
assert('empty weight',       result1.emptyMass,     939.65);
assert('empty moment',       result1.emptyMoment,   2294.80);
assert('front seats moment', result1.stationMoments.frontSeats, 345.0);
assert('baggage moment',     result1.stationMoments.stdBaggage, 73.0);
assert('total no-fuel mass', result1.totalNoFuelMass, 1109.65);
assert('fuel mass',          result1.totalFuelMass,  124.32);
assert('fuel moment',        result1.totalFuelMoment, 326.96, 0.1);
assert('total mass',         result1.totalMass,      1233.97, 0.1);
assert('CG no-fuel',        result1.cgNoFuel,       2.445, 0.01);
assert('CG with fuel',      result1.cgFull,         2.463, 0.01);
assert('CG full in limits', result1.cgFullInLimits,  1);
assert('mass in limits',    result1.massInLimits,    1);

// Test 2: OE-DDB overweight scenario
const result2 = calculate({
  aircraft: FLEET[1], // OE-DDB, MTOM 1280
  typeConfig: DA40NG,
  stationMasses: { frontSeats: 200, rearSeats: 80, stdBaggage: 18, baggageTube: 0, shortBagExt: 0, fwdExtBag: 0, aftExtBag: 0 },
  fuelLiters: { mainFuel: 148 },
  fuelMaxLiters: { mainFuel: 148 },
});

log('\n=== Test 2: OE-DDB overweight ===');
assert('total mass',      result2.totalMass, 913.73 + 200 + 80 + 18 + 148*0.84, 0.1);
assert('mass in limits',  result2.massInLimits, 0);

// Test 3: Station limit violations
log('\n=== Test 3: Station limit checks ===');
assert('front seats over', result2.stationWarnings.frontSeats, 0);
const result3 = calculate({
  aircraft: FLEET[0],
  typeConfig: DA40NG,
  stationMasses: { frontSeats: 201, rearSeats: 0, stdBaggage: 19, baggageTube: 0, shortBagExt: 0, fwdExtBag: 0, aftExtBag: 0 },
  fuelLiters: { mainFuel: 0 },
  fuelMaxLiters: { mainFuel: 148 },
});
assert('front seats 201 over', result3.stationWarnings.frontSeats, 1);
assert('baggage 19 over',      result3.stationWarnings.stdBaggage, 1);

// Test 4: Zero pilot weight
log('\n=== Test 4: Zero pilot ===');
const result4 = calculate({
  aircraft: FLEET[0],
  typeConfig: DA40NG,
  stationMasses: { frontSeats: 0, rearSeats: 0, stdBaggage: 0, baggageTube: 0, shortBagExt: 0, fwdExtBag: 0, aftExtBag: 0 },
  fuelLiters: { mainFuel: 0 },
  fuelMaxLiters: { mainFuel: 148 },
});
assert('no pilot warning', result4.noPilotWarning, 1);

// Test 5: DA42NG basic calculation
log('\n=== Test 5: DA42NG OE-FDD ===');
const DA42NG = AIRCRAFT_TYPES.DA42NG;
const result5 = calculate({
  aircraft: DA42NG.fleet[0], // OE-FDD
  typeConfig: DA42NG,
  stationMasses: { frontSeats: 160, rearSeats: 0, noseBaggage: 0, cabinBaggage: 10, baggageExt: 8, stdBaggage: 0, shortBagExt: 0, deIcingFluid: 27.5, deIcingFluid2: 0 },
  fuelLiters: { mainFuel: 189, auxFuel: 100 },
  fuelMaxLiters: { mainFuel: 200, auxFuel: 102 },
});
assert('DA42 empty weight', result5.emptyMass, 1462.16);
assert('DA42 front seats moment', result5.stationMoments.frontSeats, 160 * 2.30, 0.1);
assert('DA42 cabin baggage moment', result5.stationMoments.cabinBaggage, 10 * 3.89, 0.1);
assert('DA42 de-icing moment', result5.stationMoments.deIcingFluid, 27.5 * 1.00, 0.1);
assert('DA42 main fuel mass', result5.fuelDetails.mainFuel.mass, 189 * 0.84, 0.1);
assert('DA42 aux fuel mass', result5.fuelDetails.auxFuel.mass, 100 * 0.84, 0.1);

// Test 6: DA20-C1 basic calculation
log('\n=== Test 6: DA20-C1 OE-CCB ===');
const DA20C1 = AIRCRAFT_TYPES.DA20C1;
const result6 = calculate({
  aircraft: DA20C1.fleet[0], // OE-CCB
  typeConfig: DA20C1,
  stationMasses: { pilotAndPax: 163, baggage: 0, baggageExt: 0 },
  fuelLiters: { mainFuel: 58.5 },
  fuelMaxLiters: { mainFuel: 80 },
});
assert('DA20 empty weight', result6.emptyMass, 559.48);
assert('DA20 pilot moment', result6.stationMoments.pilotAndPax, 163 * 0.143, 0.1);
assert('DA20 fuel mass', result6.totalFuelMass, 58.5 * 0.72, 0.1);

log(`\n=== Results: ${passed} passed, ${failed} failed ===`);
</script>
</body></html>
